name: Playwright E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  core-journeys:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aboslutt
          POSTGRES_PASSWORD: aboslutt
          POSTGRES_DB: aboslutt_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aboslutt -d aboslutt_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      E2E_DATABASE_URL: postgresql://aboslutt:aboslutt@127.0.0.1:5432/aboslutt_e2e
      E2E_BASE_URL: http://127.0.0.1:3100
      E2E_PORT: 3100
      NEXTAUTH_SECRET: ci-playwright-nextauth-secret
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check:text
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/playwright/
          if-no-files-found: ignore
          retention-days: 14
